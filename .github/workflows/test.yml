name: Tests

on:
  push:
    paths:
      - 'clj-api/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'clj-api/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clj-api

    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    env:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            clj-api/.cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('clj-api/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Wait for DynamoDB Local
        run: timeout 30 bash -c 'until curl -s -o /dev/null http://localhost:8000; do sleep 1; done'

      - name: Run tests
        run: clojure -X:test
